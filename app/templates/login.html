{% extends "base.html" %}
{% block title %}Login — TaskFlow{% endblock %}

{% block extra_css %}
<style>
  .auth-wrapper {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .auth-card {
    width: 100%;
    max-width: 420px;
  }
  .auth-title {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -1px;
  }
  .auth-title span { color: var(--primary); }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center mb-4">
      <h1 class="auth-title">Task<span>Flow</span></h1>
      <p class="text-muted small">Gerencie suas tarefas com eficiência</p>
    </div>

    <div class="card">
      <div class="card-body">
        <h5 class="fw-700 mb-4">Entrar na conta</h5>
        <form method="POST" action="{{ url_for('main.login') }}">
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" name="email" class="form-control" placeholder="seu@email.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required />
          </div>
          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" name="remember" id="remember" />
            <label class="form-check-label text-muted small" for="remember">Lembrar de mim</label>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
        </form>
      </div>
    </div>

    <p class="text-center text-muted small mt-3">
      Não tem conta? <a href="{{ url_for('main.register') }}">Criar conta</a>
    </p>
  </div>
</div>
{% endblock %}
